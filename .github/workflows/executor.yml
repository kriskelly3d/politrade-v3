name: PoliTrade 3.0 — Executor

on:
  schedule:
    - cron: "0,30 12-21 * * 1-5"
  workflow_dispatch:

jobs:
  execute:
    name: Process & Execute Orders
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Schwab token
        env:
          SCHWAB_TOKEN_JSON: ${{ secrets.SCHWAB_TOKEN_JSON }}
        run: |
          mkdir -p data
          if [ -n "$SCHWAB_TOKEN_JSON" ]; then
            echo "$SCHWAB_TOKEN_JSON" > data/schwab_token.json
            echo "LIVE mode — token present"
          else
            echo "No token — engine will use PAPER mode"
          fi

      - name: Set environment variables
        run: |
          echo "SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}"       >> $GITHUB_ENV
          echo "SCHWAB_APP_KEY=${{ secrets.SCHWAB_APP_KEY }}"         >> $GITHUB_ENV
          echo "SCHWAB_APP_SECRET=${{ secrets.SCHWAB_APP_SECRET }}"   >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}"       >> $GITHUB_ENV

      - name: Run engine (one cycle)
        run: python engine.py

      - name: Print run summary
        run: |
          python - <<'EOF'
          import db
          db.init_db()
          run = db.get_last_run()
          if run:
              print(f"Run at:   {run['run_at']}")
              print(f"Fetched:  {run['disclosures_fetched']}")
              print(f"New:      {run['disclosures_new']}")
              print(f"Placed:   {run['orders_placed']}")
              print(f"Blocked:  {run['orders_blocked']}")
              print(f"Duration: {run['duration_ms']}ms")
              if run.get('error_message'):
                  print(f"ERROR:    {run['error_message']}")
          EOF
