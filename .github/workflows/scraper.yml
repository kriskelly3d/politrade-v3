name: PoliTrade 3.0 — Scraper

# Runs every 15 minutes on weekdays during market hours (ET).
# Fetches disclosures from all sources and stores new ones in Supabase.
# The executor workflow reads from DB and places orders.
# Splitting these means the scraper can run more frequently without
# blocking order execution.

on:
  schedule:
    # Every 15 min, Mon-Fri, 12:00-21:00 UTC (08:00-17:00 ET)
    - cron: "0,15,30,45 12-21 * * 1-5"
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    name: Fetch Disclosures
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: v3
        run: pip install -r requirements.txt

      - name: Write Schwab token from secret
        working-directory: v3
        env:
          SCHWAB_TOKEN_JSON: ${{ secrets.SCHWAB_TOKEN_JSON }}
        run: |
          mkdir -p data
          echo "$SCHWAB_TOKEN_JSON" > data/schwab_token.json
          echo "Token written ($(wc -c < data/schwab_token.json) bytes)"

      - name: Set environment variables
        run: |
          echo "SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}"   >> $GITHUB_ENV
          echo "SCHWAB_APP_KEY=${{ secrets.SCHWAB_APP_KEY }}"     >> $GITHUB_ENV
          echo "SCHWAB_APP_SECRET=${{ secrets.SCHWAB_APP_SECRET }}" >> $GITHUB_ENV
          echo "DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}"   >> $GITHUB_ENV

      - name: Initialize database schema
        working-directory: v3
        run: python -c "import db; db.init_db()"

      - name: Run scraper (fetch + store disclosures only)
        working-directory: v3
        run: |
          python - <<'EOF'
          import asyncio, db, ingest
          from utils import load_config, normalize_transaction_type, parse_amount_range

          db.init_db()
          cfg        = load_config()
          days_back  = cfg.get("engine", {}).get("days_back", 7)

          async def main():
              disclosures = await ingest.fetch_all(days_back)
              new_count = 0
              for d in disclosures:
                  did = d.get("disclosure_id", "")
                  if not db.is_processed(did):
                      _, _, mid = parse_amount_range(d.get("amount_range", ""))
                      d["amount_mid"] = mid
                      db.upsert_disclosure(d, action="pending")
                      new_count += 1
              print(f"Scraper: {len(disclosures)} fetched, {new_count} new → Supabase")

          asyncio.run(main())
          EOF

      - name: Summary
        run: echo "Scraper complete — disclosures stored in Supabase for executor."
